body:
  text: 卷中躍山虎立在南山躍北山兩山往復莫令閒力行三八山門闢好使青龍接虎顏志剛曰人不躍山則山門不闢龍不接虎而虎體不來也然龍雖欲接虎奈何山門不闢入頭不得欲闢其門必藉往來則自然振動也出洞虎先把身如四足形前伸後屈力而行後伸前屈依前法三八工夫各等停志剛曰以手為足故曰先把身如四足形前伸後屈者以身坐定伸手著地也後伸前屈者以身向前伸其足也前後如之若虎出洞之狀則筋骨舒暢臟腑安血脈調也飛虹虎直伸兩手悉飛虹轉向西來也一同左右力行三八數自然舒暢美心胸志剛曰以兩手飛向左而轉右飛如長虹之狀則筋骨安舒心胸美暢而疾病何由生哉舒筋虎形體須令四足然左前右後直如弦右前左後仍如此筋骨安舒疾病痊志剛曰前左足後右足後左足前右足直舒如弓弦之狀數周二十四次則筋骨安舒而疾病遠矣懸梁虎手把懸梁著力伸仍令左右各分明一升一降周三八疾病蠲除氣血行志剛曰兩手把懸梁將身著力懸起一力起於梁左一力起於梁右須以肩至梁如是行之則氣血和暢四肢舒參五臟安逸而疾病蠲除矣鼎峙虎蟠膝仍令兩手撐肩前肩後力如爭頭昂背直行三八擺此形骸理大經志剛曰蟠膝而坐為一足兩手而撐共三足故曰鼎峙然後昂其頭以左右肩如相爭之狀擺其形骸則經調氣順百病皆除鼎峙之功其大如此獨立虎曲令一足在其髓兩手舒如舉重酸左右力行三八就自然遍體骨筋安志剛曰曲一足在髖者以一足曲於股間也舒兩手如舉重者以兩手如提物也左右如之遍身調暢疾病可除也翻身虎翻首翻身把腳飛卻將雙手去扶持連行三八骨筋活免使闔門有倦疲志剛曰以頭著地以腳飛過兩手著頭兩旁使不歪也如此行之則筋骨豈有不活氣血豈有不調暢乎反躬虎反手巴肩務到家力巴不著處偏巴昂頭蟠膝工當九九九行持效可誇志剛曰蟠膝昂頭身先坐定反手巴肩巴不著處愈巴之自然胸膈寬舒氣血調暢這意思誰肯安排如數行之方知效驗納泉虎心火那堪盛上升一身氣血妄流行聚精咽納惟三八火降神安五臟寧志剛曰錦身之後心火上升氣血妄動故先師作此詩納精咽之引納泉之妙旨以降心火以安神也神安火降五臟寧矣桃花虎挺身蟠膝手來呵呵十呵兮更十搓面上力摩令火熱自然皺少與紅多志剛曰十搓十呵欲待如何晨昏摩面皺少紅多安神虎無為斂足謂安神神既能安體自淳萬里坦然皆莫顧一心惟守滿園春志剛曰無為靜坐乃安神也神既安體必淳朴惟守一不幹事也但見滿目春光一身和氣耳虎吹龍笛笛無孔竅不須橫就便輕吹氣自通直使箇中一二物泥丸頂上覺生風志剛曰笛不吹氣不入氣不入路不通路不通丹不行自吹不得故令彼吹使氣入路通而丹行也方可煉之覺窗門氣透泥丸風生此吹笛之驗矣龍鼓虎琴貼胸交股動渠心輔翼勾肩興趣臨此是鼓琴真妙訣不須徽指發清音志剛曰貼胸交股惹他心情輔翼勾肩動他興趣心情發則清音至興趣動則妙理來所謂無絃琴到底清音何自中但得琴中趣何勞弦上音龍虎交加龍先擒虎虎擒龍龍虎交加興趣濃卻用口傳心授法口傳心授要勤功志剛曰此安爐立鼎之象也他以兩翼而擒我我以兩翼擒他所謂兩翼七竅輔翼人也是詩雖不出先師之意觀其交加之字乃安爐立鼎之道也又非上章可比口傳心授詳見下章龍虎傳授口訣還須口口傳只因口訣路通玄既知火發靈光透顯出青龍惹妙鉛志剛曰人之一身以心為主小腸與舌又專主乎心故知舌舐舌則心火盛心火盛則小腸盛小腸盛則知先天真鉛將至矣真鉛既至此口傳心授之妙訣驗矣獻龍招虎獻出青龍惹黑龜光華閃爍透簾幃若非獻出青龍首怎得天門發地雷志剛曰天門者西北也地雷者復卦也一陽生於西北便宜獻出青龍引惹黑龜所謂一陽初動中宵漏水溫溫鉛鼎光透簾幃之意也地龍天虎獻龍招虎總相連此際須當地作天欲得倒顛玄妙理真機乃向舌頭邊志剛曰獻龍招虎皆牽惹之方顛倒倒顛乃希求之法欲希真火龍頭上仍覓真機虎舌邊虎動龍迎仍從口訣討清音地上於大試舌心變火作冰宜下手龍居虎穴虎來尋志剛曰舌如火則潮動舌如冰則陽生此穴之功其重於此龍居虎窟龍居虎穴世情同此際應當下死工顛倒作為令彼動須臾一滴過吾東志剛曰龍入虎門虎為龍主世之所同虎為龍主龍作虎賓道之所向使得死心塌地由他活於周天若非這樣工夫怎得那般造化龍問虎信彼既情濃我不知言言透露候其時低頭閉目真鉛至倏地飛來似火馳志剛曰他快樂我不知我問他他方說彼若低頭目閉我直吸鼻通玄這樣工夫誰知誰識此般效驗如火如珠虎躍龍潭西方白虎接青龍孰料東方道路通一吸盡令歸北海看來只此是奇功志剛曰虎接青龍龍反接虎先將脊後通其路更徑鼻中吸那鉛即知火珠而來便用登扳之錦未蒙師旨安敢胡為既得師傳無不應也虎至龍鄉東方西到即登扳若不登扳復出關果使一時工足備自然轉過尾閭彎志剛曰這樣工夫詳於龍錦至此而又發明者可見前之所言皆煉已之功其實用卻在於此若不如此焉得周轉一身而致吞服之妙學道之士逢師口訣切宜仔細安排三虎朝龍三虎朝龍澆灌功常將二虎作屯蒙屯蒙兩卦將朝暮一虎鬚防月月紅志剛曰三虎者即鼎分三足也朝用這個暮用那個待那個月桂花開卻用也乃始於屯蒙終於既濟十月火足六百卦終也一者上山採藥二者臥地登天二九遍三者坎宮叉手叉腰四者定自心神先定坐五者還丹擊鼓叩齒三十六六者灌頂除火拍頂門一百數七者朝天見聖反手朝天九九數八者搖動山川兩手挽頭搖九九數九者垂腰足步腳登二九數十者任從離合聽其自然訣曰其法於甲子日甲子時下功子前午後共行三次進則吸退則吹
