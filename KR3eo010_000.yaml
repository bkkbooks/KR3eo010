body:
  text: 大道修真捷要選仙指源篇夫修煉金液大還丹者參悟大道見性明心萬緣頓息方可修行若有絲毫片晌即不是也若修行人不悟大道金丹之要迷失真性坐守頑空任意多般有咽月吞霞河車搬運以火燒臍吞津運氣按摩導引閉眼搖精盲修瞎煉終為下鬼行多傍門小法用盡精機四大分散只是精靈下鬼不能入聖超凡若修正法者參悟大道不必多求一得永得一悟寸絲不挂內外貞曰實證實悟性命雙全方可下手修煉真性真命呂祖師云只修煉丹不悟性此是修行第一病只悟祖性不修丹萬劫陰靈難入聖性命者是陰陽之祖天地之根人之一身得天地之中是萬神朝禮之宮左為性右為命是人一身之主宰便是真根蒂也夫性者是丹丹者是神神者是道道者是心心音即性也非人之身中坎離肉心也此心與天地同生日月並長陰陽未有此心先有是父母未生以前虛無之心也從今至古未曾有增有壞與元始同其年老君齊其壽亙古至今朗耀虛空無邊際不沽南北與西東金丹一粒大如黍米輝輝獨露燦燦光明度人經云元始懸一寶珠大如黍米在空懸之中去地五丈即此意也在先天之心者謂之性萬體一珠無欠無餘行如掣電坐若太虛杳杳冥冥清清朗朗是一靈真性發之不毀散之不滅無中有象此乃是先天之神也一合意生落於母腹胎中體如嬰兒為之心也性命相連不能出戶九月胎全十月氣足子母分離各自乾坤以為氣質之性是謂全體散滿六合一體萬殊日纍月長六情相連眼觀心動耳聽神移此為耗散不全之體故要修煉修煉者性命乃太極在黃庭之中是也夫命者氣之精也嬰兒初在母腹中其臍與母氣相連母呼亦呼母吸亦吸氣足降生剪斷臍帶然後各自呼吸而受父母一點元氣落於下丹田中寄體於腎下丹田者前對臍後對腎居兩腎中間其形若連環廣一寸二分應天地十二月應日中十二時應四時八節應二十四氣應周天三百六十五度數四分度之一周圍八竅應八卦二竅應乾坤上通泥九下透湧泉傍六竅應震兌六卦以通六腑中間一竅第一神室玄關萬神都會之府萬神萬氣萬精皆聚於此竅是人身之主宰即真命也呼吸動靜乃玄關一竅又名爐灶每日進工鍛鍊內想不出外想不入萬緣放下更時時刻刻照顧保養神氣補滿三田一氣足方可坐關修煉陽神是也可不慎歟夫修煉金丹者抱元守一修煉神丹守一者只守下丹田玄關一竅此是爐灶又名萬神都會府每日行工存想只在下丹田諸氣歸根此處煅煉綿綿不絶時時守一保養純陽浩然之氣補足三田一身氣足方可坐三靜關而修煉神丹耳夫金丹者乃人之身中真陽是也與天地同出日月並明散則成氣聚則成丹此乃大道學人當自悟焉凡修煉全真者須明性命大徹大悟無所不通若不得真火煅煉道化不成片段終為下鬼要坐三靜關不坐者三百日工夫不成陽神不現實要坐三靜關若坐三靜關者避靜去處不聽雞犬之聲斷絶是非忘思息念一靈真性不去不來只存想心中黑氣下降落於爐鼎此是添汞也次好腎中紅氣上升於爐鼎之內萬氣歸爐真火煅煉滿爐紅氣氣中自有精氣神三者混合此是金丹也火候不差一心內守綿綿不絶三萬六千刻之工夫時時守鼎爐修煉除修補外十個月胎圓陽神自現正要保養胎嬰兒蒼老方可出戶不可遠離步步要小心自有證驗歸空口訣凡人臨命終之時四大分散何處安身立命先要每日工夫臨命純熟放下萬緣絲毫不挂一心內守若神離凡殼之時從泥丸宮太極天門出不可離了此宮若離了即墜幽冥無真心無真相無有絲毫念起見諸色相者不可起念頭正要澄心定意緊守念頭不得分毫有趨向無去無來湛然圓滿如香煙而起直至太空白雲深處撥不開吹不散一靈真性觀萬里如在目前此乃真空也行如掣電坐若太虛日月為鄰諸星為友火不能燒水不能溺任意縱橫去來無礙獨露真空便是安身超凡也萬劫長存切不可思親念友但起一念能墮落人間意入胞胎萬劫難出是為下鬼慎哉周天三百六十五度九還七返金液大還丹立功純陽火候圖人本身龍虎交媾産金鼎抽添進退之圖此天地大道備矣不可輕泄輕泄者殃及九祖祕之凡既濟一次一粒如金粟大逐入黃庭每粒出金光一道金液還丹捷徑金液還丹者神與氣精一夫一婦為之道執著無為妄行有作只可入定出神不得反被落陰敗體執著有者行有為之正術先天真一之氣以奪其命鼎分三足缺一不可朝用這個待其月桂花開卻用那個是也人之一身豈無真鉛真汞只在坎離中尋離中生鉛坎中生汞又曰龍來尋白虎虎自覓青龍其餘草木鉛汞交梨火棗坤牛乾馬皆是假名金丹大藥久煉築基汞後授鉛鉛者陽精也汞者陰精也澆灌十月休離鼎溫養三年不用爐十月火終六百卦足提得陽精過我身來近便處運一點陰汞以迎之配合真鉛日日可築成矣金剛經曰得夫堅固是也方可入聖超凡安排用運交媾收擒務心誠意虔採取無令失所人人經至為有晦朔此般至寶家家有之三日晦四日朔便要問明明者經行時是也卻用那個午進陰符切忌吾家五漏子行陽火仍防彼家三傷甘津滿口勤吞咽採在弦前扳體望後後休扳勿用徵扳者行功在九淺一深八十一數運動用仔縮抽吸閉此五字訣説下手真個醜形如龜行體似蟲爬慢進徐退一退一吸進則吸退則吹妙在於多惟多愈益吸之不得開口鼻引清氣嘔乳汁入腦戶使靈根不倒此採氣之妙道也鼻為天門腎為命門吸時存想赤黃二氣入靈柯如竹筒吸水自下而上運動河車一轉通若人如得赤黃二氣便覺氣熱如火變火作冰宜下手龍居虎窟虎來尋舌如火則潮動舌如冰則陰生急急採之暗裡來明裡煉待他氣至至後使鼎手從尾閭夾脊背後往上重摩三五次十數次運動使有升而有降送歸土釜須封固棄去金爐密煉烹那期夫婦雙和暢何慮金丹不結成噫慎哉老子曰一得永得自然身輕第一件難事矣工夫在此便用登扳之錦若不登扳復出關登天九九如無怠這件東西轉過灣須端坐運歸空挺身叉腰綏款輕提休墜下待滿口津液分三口咽下後依次行工銀劍式樣訣曰近便運一點真汞以迎之法第一握固七次第二按腿七次第三交固七次第四摩腎堂五十次第五抱運七次第六鼻引清氣長出一口氣左手恰子午而坐工夫畢以舌柱頂上齶赤龍攪左右二十一次分作三口咽下以殺心火恐身生瘡疽以兩手面上力摩搓皺少紅多工畢退大功先出濁氣四十九口返叉托天七次左右握拳使力托天七次放下鼻引清氣長出一口氣止此是一度之功任意靜坐也若採得一度者延壽一紀如得十感即年一百二十歲矣若得先天后天之氣者功超萬劫如覺採得數多其山色漸凋可即須之慎焉祖師曰白玉蟾云金丹修煉先當究玄夫一竅的在何處腎之前臍之後大腸右中回光反照詩曰修丹真要識玄關識破玄關事不難臍後腎前虛若有分明一氣透天端問採藥如何下工聚氣凝神灰心泯志絶後再蘇欺居不得神安則氣聚神是氣之子氣是神之母神氣相見人命始生詩曰下工採藥易非難只要凝神向內觀萬類一時皆忘卻觀中就見有多端問性命如何説詩曰性在泥丸命在臍天魂地魄坎交離箇中便是生死戶多少修行人不知
